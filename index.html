<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paylaş veya Çal Oyunu</title>
    <style>
        :root {
            --bg-color: #121214;
            --container-bg: #1e1e24;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --share-color: #10b981;
            --steal-color: #ef4444;
            --border-color: #33333f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Skor Tablosu */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 15px;
        }

        .score-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .score-box.player-box {
            border-left: 4px solid var(--primary);
        }

        .score-box.bot-box {
            border-left: 4px solid #f59e0b;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
        }

        /* Tur Bilgisi */
        .round-info {
            text-align: center;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(79, 70, 229, 0.1);
            border: 1px dashed var(--primary);
            border-radius: 8px;
            font-weight: 600;
        }

        .double-round-active {
            color: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0 { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.8; }
        }

        /* Seçim Alanı */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-title {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-share {
            background-color: var(--share-color);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-share:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }

        .btn-steal {
            background-color: var(--steal-color);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        .btn-steal:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-desc {
            font-size: 11px;
            font-weight: normal;
            opacity: 0.8;
        }

        /* Sonuç ve Tur Özeti */
        .result-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }

        .result-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #f59e0b;
        }

        .choices-comparison {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }

        .choice-display {
            text-align: center;
        }

        .choice-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 5px;
            font-size: 14px;
        }

        .badge-share { background-color: rgba(16, 185, 129, 0.2); color: var(--share-color); border: 1px solid var(--share-color); }
        .badge-steal { background-color: rgba(239, 68, 68, 0.2); color: var(--steal-color); border: 1px solid var(--steal-color); }

        .vs {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .round-changes {
            text-align: center;
            font-size: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        /* Geçmiş Log Tablosu */
        .history-section {
            margin-top: 25px;
        }

        .history-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-table-wrapper {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
        }

        th {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            padding: 10px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .positive { color: var(--share-color); font-weight: bold; }
        .negative { color: var(--steal-color); font-weight: bold; }

        /* Sıfırlama Butonu */
        .control-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="game-container">
    <header>
        <h1>Paylaş veya Çal</h1>
        <div class="subtitle">Kararını ver ve rakibinin hamlesini bekle!</div>
    </header>

    <div class="scoreboard">
        <div class="score-box player-box">
            <div class="score-label">SENİN SKORUN</div>
            <div class="score-value" id="player-score">0</div>
        </div>
        <div class="score-box bot-box">
            <div class="score-label">BOTUN SKORU</div>
            <div class="score-value" id="bot-score">0</div>
        </div>
    </div>

    <div class="round-info" id="round-info-display">
        Tur: <span id="current-round-num">1</span> <span id="double-round-tag"></span>
    </div>

    <div class="action-area" id="action-area">
        <div class="action-title">Hamleni Seç</div>
        <div class="btn-group">
            <button class="btn btn-share" onclick="makePlay('paylas')">
                <span>PAYLAŞ (P)</span>
                <span class="btn-desc">Karşılıklı kazanç hedeflersin.</span>
            </button>
            <button class="btn btn-steal" onclick="makePlay('cal')">
                <span>ÇAL (Ç)</span>
                <span class="btn-desc">Karşı tarafı saf dışı bırakıp puan alırsın.</span>
            </button>
        </div>
    </div>

    <div class="result-panel" id="result-panel">
        <div class="result-title" id="result-summary">Tur Değerlendirildi!</div>
        <div class="choices-comparison">
            <div class="choice-display">
                <div style="font-size: 12px; color: var(--text-muted);">Senin Seçimin</div>
                <div class="choice-badge" id="player-choice-badge">-</div>
            </div>
            <div class="vs">VS</div>
            <div class="choice-display">
                <div style="font-size: 12px; color: var(--text-muted);">Botun Seçimi</div>
                <div class="choice-badge" id="bot-choice-badge">-</div>
            </div>
        </div>
        <div class="round-changes" id="score-changes-text">
            Sen: <span class="positive">+0</span> | Bot: <span class="positive">+0</span>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">Oyun Geçmişi</div>
        <div class="history-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Tur</th>
                        <th>Tür</th>
                        <th>Senin Hamlen</th>
                        <th>Botun Hamlesi</th>
                        <th>Senin Puan Değişimin</th>
                        <th>Botun Puan Değişimi</th>
                    </tr>
                </thead>
                <tbody id="history-log-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="control-area">
        <button class="btn-reset" onclick="resetGame()">Oyunu Sıfırla</button>
    </div>
</div>

<script>
    // Oyun Değişkenleri
    let youScore = 0;
    let botScore = 0;
    let currentRound = 1;
    let playerHistory = [];

    // Çift Puanlı Tur Sıklığı (Her 3 turda bir çift puan turu olur)
    function checkIsDoubleRound(round) {
        return round % 3 === 0; 
    }

    // Karar Verme Mekanizması
    function getBotChoice() {
        if (playerHistory.length === 0) {
            return 'paylas';
        }
        
        let lastPlayerMove = playerHistory[playerHistory.length - 1];
        
        // %15 oranında sürpriz çalma hamlesi
        if (Math.random() < 0.15) {
            return 'cal';
        }
        
        return lastPlayerMove;
    }

    // PUANLAMA SİSTEMİ (P-P: 3-3 | Ç-P: 5 / -1 | Ç-Ç: -1 / -1)
    function evaluateRound(playerChoice, botChoice, isDoubleRound) {
        let playerRoundScore = 0;
        let botRoundScore = 0;

        if (playerChoice === 'paylas' && botChoice === 'paylas') {
            playerRoundScore = 3;
            botRoundScore = 3;
        } else if (playerChoice === 'cal' && botChoice === 'paylas') {
            playerRoundScore = 5;
            botRoundScore = -1;
        } else if (playerChoice === 'paylas' && botChoice === 'cal') {
            playerRoundScore = -1;
            botRoundScore = 5;
        } else if (playerChoice === 'cal' && botChoice === 'cal') {
            playerRoundScore = -1;
            botRoundScore = -1;
        }

        // Çift puan turu çarpanı
        if (isDoubleRound) {
            playerRoundScore *= 2;
            botRoundScore *= 2;
        }

        // Toplam skorlara ekle
        youScore += playerRoundScore;
        botScore += botRoundScore;

        updateHUD();

        return {
            playerChange: playerRoundScore,
            botChange: botRoundScore
        };
    }

    // Skorları Arayüze Yazdır
    function updateHUD() {
        document.getElementById('player-score').innerText = youScore;
        document.getElementById('bot-score').innerText = botScore;
    }

    // Oyuncunun Hamle Yapması
    function makePlay(playerChoice) {
        const isDouble = checkIsDoubleRound(currentRound);
        const botChoice = getBotChoice();

        const result = evaluateRound(playerChoice, botChoice, isDouble);
        playerHistory.push(playerChoice);

        showRoundResults(playerChoice, botChoice, result, isDouble);
        addHistoryRow(currentRound, isDouble, playerChoice, botChoice, result);

        currentRound++;
        prepareNextRound();
    }

    // Tur Etiketlerini Hazırla
    function prepareNextRound() {
        document.getElementById('current-round-num').innerText = currentRound;
        const isNextDouble = checkIsDoubleRound(currentRound);
        const doubleTag = document.getElementById('double-round-tag');

        if (isNextDouble) {
            doubleTag.innerText = "(ÇİFT PUAN TURU!)";
            doubleTag.className = "double-round-active";
        } else {
            doubleTag.innerText = "";
            doubleTag.className = "";
        }
    }

    // Tur Sonuçlarını Ekrana Bas
    function showRoundResults(playerChoice, botChoice, result, isDouble) {
        const panel = document.getElementById('result-panel');
        panel.style.display = 'block';

        const pBadge = document.getElementById('player-choice-badge');
        pBadge.innerText = playerChoice === 'paylas' ? 'PAYLAŞ' : 'ÇAL';
        pBadge.className = `choice-badge ${playerChoice === 'paylas' ? 'badge-share' : 'badge-steal'}`;

        const bBadge = document.getElementById('bot-choice-badge');
        bBadge.innerText = botChoice === 'paylas' ? 'PAYLAŞ' : 'ÇAL';
        bBadge.className = `choice-badge ${botChoice === 'paylas' ? 'badge-share' : 'badge-steal'}`;

        const scoreChangesText = document.getElementById('score-changes-text');
        const pSign = result.playerChange >= 0 ? `+${result.playerChange}` : result.playerChange;
        const bSign = result.botChange >= 0 ? `+${result.botChange}` : result.botChange;
        
        const pClass = result.playerChange >= 0 ? 'positive' : 'negative';
        const bClass = result.botChange >= 0 ? 'positive' : 'negative';

        scoreChangesText.innerHTML = `Sen: <span class="${pClass}">${pSign}</span> | Bot: <span class="${bClass}">${bSign}</span> ${isDouble ? '<strong>(x2 Çarpanı)</strong>' : ''}`;
    }

    // Tabloya Geçmişi Ekle
    function addHistoryRow(round, isDouble, playerChoice, botChoice, result) {
        const tbody = document.getElementById('history-log-body');
        const row = document.createElement('tr');

        const pSign = result.playerChange >= 0 ? `+${result.playerChange}` : result.playerChange;
        const bSign = result.botChange >= 0 ? `+${result.botChange}` : result.botChange;
        const pClass = result.playerChange >= 0 ? 'positive' : 'negative';
        const bClass = result.botChange >= 0 ? 'positive' : 'negative';

        row.innerHTML = `
            <td>${round}</td>
            <td>${isDouble ? 'Çift' : 'Normal'}</td>
            <td>${playerChoice === 'paylas' ? 'Paylaş (P)' : 'Çal (Ç)'}</td>
            <td>${botChoice === 'paylas' ? 'Paylaş (P)' : 'Çal (Ç)'}</td>
            <td class="${pClass}">${pSign}</td>
            <td class="${bClass}">${bSign}</td>
        `;

        tbody.insertBefore(row, tbody.firstChild);
    }

    // Oyunu Sıfırla
    function resetGame() {
        youScore = 0;
        botScore = 0;
        currentRound = 1;
        playerHistory = [];

        updateHUD();
        prepareNextRound();

        document.getElementById('result-panel').style.display = 'none';
        document.getElementById('history-log-body').innerHTML = '';
    }

    prepareNextRound();
</script>

</body>
</html>
