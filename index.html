<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Game Theory — Çal ya da Paylaş</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0d;
    --stage: #141319;
    --stage-edge: #201f28;
    --gold: #d4af37;
    --gold-bright: #f2d675;
    --steal: #b23a3a;
    --steal-bright: #d95252;
    --share: #2f7d6b;
    --share-bright: #3fa088;
    --ink: #ece7db;
    --ink-dim: #9a978f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at 50% 0%, #1b1a22 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 20px 40px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 34px;
    text-align: center;
    letter-spacing: 0.5px;
    color: var(--gold-bright);
    margin: 6px 0 2px;
    text-shadow: 0 0 20px rgba(212,175,55,0.25);
  }
  
  .subtitle {
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 22px;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    font-family: 'Cormorant Garamond', serif;
  }
  
  .score-box {
    text-align: center;
    min-width: 84px;
  }
  
  .score-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  
  .score-value {
    font-size: 30px;
    font-weight: 700;
    color: var(--ink);
    transition: color 0.3s ease;
  }
  .score-value.you { color: var(--share-bright); }
  .score-value.bot { color: var(--steal-bright); }

  .round-pill {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--gold);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 999px;
    padding: 6px 14px;
    background: rgba(212,175,55,0.06);
  }

  .stage {
    position: relative;
    background: linear-gradient(180deg, var(--stage) 0%, #0e0d12 100%);
    border: 1px solid var(--stage-edge);
    border-radius: 20px;
    padding: 30px 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 340px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.4);
  }

  .spotlight {
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .coin {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 55%, #8a6a1f 100%);
    box-shadow: 0 0 30px rgba(212,175,55,0.35), inset 0 -6px 10px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin-bottom: 22px;
    transition: transform 0.5s ease;
  }
  .coin.spin { animation: spin 0.9s ease-in-out; }
  @keyframes spin {
    0% { transform: rotateY(0deg) scale(1); }
    50% { transform: rotateY(360deg) scale(1.08); }
    100% { transform: rotateY(720deg) scale(1); }
  }

  .timer-ring {
    position: relative;
    width: 64px; height: 64px;
    margin-bottom: 20px;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle {
    fill: none;
    stroke-width: 4;
  }
  .timer-track { stroke: rgba(255,255,255,0.08); }
  .timer-progress {
    stroke: var(--gold);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 22px;
  }

  .prompt {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 22px;
    min-height: 30px;
  }

  .choices {
    display: flex;
    gap: 14px;
    width: 100%;
  }
  
  .choice-btn {
    flex: 1;
    padding: 16px 0;
    border-radius: 14px;
    border: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
  }
  .choice-btn:active { transform: scale(0.96); }
  
  .choice-btn.steal {
    background: linear-gradient(180deg, var(--steal-bright), var(--steal));
    color: #1a0a0a;
    box-shadow: 0 8px 20px rgba(178,58,58,0.35);
  }
  
  .choice-btn.share {
    background: linear-gradient(180deg, var(--share-bright), var(--share));
    color: #0a1a15;
    box-shadow: 0 8px 20px rgba(47,125,107,0.35);
  }
  .choice-btn:disabled { opacity: 0.35; cursor: default; }

  .result-card {
    width: 100%;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .result-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    margin: 6px 0;
  }
  .result-line .you-tag { color: var(--share-bright); font-weight: 700; }
  .result-line .bot-tag { color: var(--steal-bright); font-weight: 700; }
  
  .points-line {
    margin-top: 14px;
    font-size: 15px;
    color: var(--ink-dim);
    letter-spacing: 0.5px;
  }
  .points-line b { color: var(--gold-bright); }

  .next-hint {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* Final Alanı ve İstatistikler */
  .final {
    text-align: center;
    width: 100%;
    animation: fadeUp 0.5s ease;
  }
  .final-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    color: var(--gold-bright);
    margin-bottom: 4px;
  }
  .final-sub {
    color: var(--ink-dim);
    font-size: 15px;
    margin-bottom: 20px;
  }

  .stats-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    text-align: left;
  }
  .stats-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 6px;
    margin-bottom: 10px;
    text-align: center;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin: 8px 0;
    color: var(--ink-dim);
  }
  .stats-row span {
    color: var(--ink);
    font-weight: 600;
  }
  .stats-row .highlight-bot {
    color: var(--gold-bright);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 700;
  }

  .replay-btn {
    padding: 14px 28px;
    border-radius: 999px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-bright);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .replay-btn:hover {
    background: rgba(212, 175, 55, 0.1);
  }
  .replay-btn:active { transform: scale(0.97); }

  .log {
    margin-top: 18px;
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .log-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.05);
    transition: background-color 0.3s;
  }
  .log-dot.steal { background: var(--steal-bright); box-shadow: 0 0 8px rgba(217,82,82,0.4); }
  .log-dot.share { background: var(--share-bright); box-shadow: 0 0 8px rgba(63,160,136,0.4); }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">The Game Theory</div>
  <div class="subtitle">Çal ya da Paylaş</div>

  <div class="hud">
    <div class="score-box">
      <div class="score-label">Sen</div>
      <div class="score-value you" id="youScore">0</div>
    </div>
    <div class="round-pill" id="roundPill">Tur 1 / 7</div>
    <div class="score-box">
      <div class="score-label">Rakip</div>
      <div class="score-value bot" id="botScore">0</div>
    </div>
  </div>

  <div class="stage">
    <div class="spotlight"></div>

    <div id="playArea" style="width: 100%; text-align: center;">
      <div class="coin" id="coin">🪙</div>

      <div class="timer-ring" style="margin: 0 auto 20px;">
        <svg width="64" height="64">
          <circle class="timer-track" cx="32" cy="32" r="28"></circle>
          <circle class="timer-progress" id="timerCircle" cx="32" cy="32" r="28"
            stroke-dasharray="176" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-num" id="timerNum">20</div>
      </div>

      <div class="prompt" id="prompt">Kararını ver.</div>

      <div class="choices">
        <button class="choice-btn steal" id="stealBtn">ÇAL</button>
        <button class="choice-btn share" id="shareBtn">PAYLAŞ</button>
      </div>
    </div>

    <div id="resultArea" style="display:none;" class="result-card">
      <div class="result-line">Sen: <span class="you-tag" id="youChoiceText">—</span></div>
      <div class="result-line">Rakip: <span class="bot-tag" id="botChoiceText">—</span></div>
      <div class="points-line" id="pointsText"></div>
      <div class="next-hint" id="nextHint">Sıradaki tur hazırlanıyor…</div>
    </div>

    <div id="finalArea" style="display:none;" class="final">
      <div class="final-title" id="finalTitle">Oyun Bitti</div>
      <div class="final-sub" id="finalSub">Skorlar hesaplandı.</div>
      
      <div class="stats-card">
        <div class="stats-title">Savaş Özeti</div>
        <div class="stats-row">Senin Tercihlerin: <span id="statYourChoices">0 Çal / 0 Paylaş</span></div>
        <div class="stats-row">Gizemli Rakibin: <span id="statBotStrategy" class="highlight-bot">—</span></div>
      </div>

      <button class="replay-btn" id="replayBtn">Tekrar Oyna</button>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
  // --- SABİTLER & AYARLAR ---
  const TOTAL_ROUNDS = 7;
  const ROUND_TIME = 20;
  const CIRC = 176;

  // --- OYUN DURUMU (STATE) ---
  let round = 0;
  let youScore = 0;
  let botScore = 0;
  let timeLeft = ROUND_TIME;
  let timerInterval = null;
  let decided = false;
  
  // Geçmiş takibi
  let playerHistory = []; // Oyuncunun tercihleri ('steal' veya 'share')
  let botHistory = [];    // Botun tercihleri ('steal' veya 'share')
  let currentBot = null;  // Aktif bot nesnesi

  // --- SES SENTEZLEYİCİ (HARİCİ DOSYASIZ) ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } 
    else if (type === 'tick') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now);
      osc.stop(now + 0.05);
    } 
    else if (type === 'win') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.setValueAtTime(400, now + 0.08);
      osc.frequency.setValueAtTime(600, now + 0.16);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    } 
    else if (type === 'lose') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.linearRampToValueAtTime(110, now + 0.3);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    }
  }

  // --- BOT STRATEJİLERİ ---
  const BOT_STRATEGIES = [
    {
      name: "Diplomat (Tit For Tat)",
      description: "İlk tur barışçıldır. Sonraki her turda senin bir önceki hamleni birebir kopyalar.",
      decide: function() {
        if (playerHistory.length === 0) return 'share';
        return playerHistory[playerHistory.length - 1]; // Oyuncunun son hamlesi neyse o
      }
    },
    {
      name: "Kinci (Grudger)",
      description: "İş birliğiyle başlar. Ancak ona karşı sadece 1 kez bile çalsan, asla affetmez ve oyun sonuna kadar hep çalar.",
      decide: function() {
        if (playerHistory.length === 0) return 'share';
        const hasStolen = playerHistory.includes('steal');
        return hasStolen ? 'steal' : 'share';
      }
    },
    {
      name: "Kumarbaz (Random)",
      description: "Tamamen öngörülemezdir. Şansa inanır, her tur %50 ihtimalle çalar veya paylaşır.",
      decide: function() {
        return Math.random() < 0.5 ? 'steal' : 'share';
      }
    },
    {
      name: "Sabırlı (Tit For Two Tats)",
      description: "Son derece hoşgörülüdür. Sen üst üste 2 kez çalmadığın sürece o her zaman paylaşmaya devam eder.",
      decide: function() {
        if (playerHistory.length < 2) return 'share';
        const last = playerHistory[playerHistory.length - 1];
        const prev = playerHistory[playerHistory.length - 2];
        return (last === 'steal' && prev === 'steal') ? 'steal' : 'share';
      }
    },
    {
      name: "Analist (Adaptive)",
      description: "Tarihi analiz eder. Son 3 turunun çoğunluğuna bakar; eğer bencil davranıyorsan o da bencil olur.",
      decide: function() {
        if (playerHistory.length < 3) return 'share'; // Analiz için veri birikene kadar paylaşır
        
        // Son 3 veya 4 hamleyi incele
        const lookback = Math.min(4, playerHistory.length);
        const recent = playerHistory.slice(-lookback);
        const stealCount = recent.filter(h => h === 'steal').length;
        
        // Eğer yarısından fazlasında çaldıysan, o da çalar
        return (stealCount > lookback / 2) ? 'steal' : 'share';
      }
    }
  ];

  // --- ARD ARDA AYNI BOTUN GELMESİNİ ENGELLEYEN SEÇİM FONKSİYONU ---
  function selectRandomBot() {
    const lastBotName = sessionStorage.getItem('lastPlayedBot');
    let availableBots = BOT_STRATEGIES;
    
    // Eğer hafızada eski bot varsa ve listede alternatifler varsa, onu ele
    if (lastBotName && BOT_STRATEGIES.length > 1) {
      availableBots = BOT_STRATEGIES.filter(b => b.name !== lastBotName);
    }
    
    const chosen = availableBots[Math.floor(Math.random() * availableBots.length)];
    sessionStorage.setItem('lastPlayedBot', chosen.name);
    return chosen;
  }

  // --- DOM ELEMENTLERİ ---
  const playArea = document.getElementById('playArea');
  const resultArea = document.getElementById('resultArea');
  const finalArea = document.getElementById('finalArea');
  const roundPill = document.getElementById('roundPill');
  const prompt = document.getElementById('prompt');
  const stealBtn = document.getElementById('stealBtn');
  const shareBtn = document.getElementById('shareBtn');
  const timerNum = document.getElementById('timerNum');
  const timerCircle = document.getElementById('timerCircle');
  const coin = document.getElementById('coin');
  const youScoreEl = document.getElementById('youScore');
  const botScoreEl = document.getElementById('botScore');
  const youChoiceText = document.getElementById('youChoiceText');
  const botChoiceText = document.getElementById('botChoiceText');
  const pointsText = document.getElementById('pointsText');
  const nextHint = document.getElementById('nextHint');
  const logEl = document.getElementById('log');

  // --- OYUN AKIŞI ---

  function startRound() {
    round++;
    if (round > TOTAL_ROUNDS) { return endGame(); }

    decided = false;
    timeLeft = ROUND_TIME;
    roundPill.textContent = `Tur ${round} / ${TOTAL_ROUNDS}`;
    prompt.textContent = 'Kararını ver.';
    stealBtn.disabled = false;
    shareBtn.disabled = false;
    resultArea.style.display = 'none';
    finalArea.style.display = 'none';
    playArea.style.display = 'block';
    timerCircle.style.stroke = 'var(--gold)';
    updateTimerUI();

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 5) { 
        timerCircle.style.stroke = 'var(--steal-bright)'; 
        playSound('tick');
      }
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!decided) { makeChoice('share'); } // Süre biterse otomatik "Paylaş" seçilir
      }
    }, 1000);
  }

  function updateTimerUI() {
    timerNum.textContent = Math.max(timeLeft, 0);
    const offset = CIRC - (CIRC * (timeLeft / ROUND_TIME));
    timerCircle.style.strokeDashoffset = offset;
  }

  function makeChoice(playerChoice) {
    if (decided) return;
    decided = true;
    clearInterval(timerInterval);
    
    stealBtn.disabled = true;
    shareBtn.disabled = true;
    playSound('click');

    // Bot kendi stratejisine göre karar verir
    const botChoice = currentBot.decide();

    // Puanlama Algoritması
    let yourPoints = 0, botPoints = 0;
    if (playerChoice === 'share' && botChoice === 'share') {
      yourPoints = 3; botPoints = 3;
    } else if (playerChoice === 'steal' && botChoice === 'share') {
      yourPoints = 5; botPoints = 1;
    } else if (playerChoice === 'share' && botChoice === 'steal') {
      yourPoints = 1; botPoints = 5;
    } else if (playerChoice === 'steal' && botChoice === 'steal') {
      yourPoints = -1; botPoints = -1;
    }

    youScore += yourPoints;
    botScore += botPoints;
    youScoreEl.textContent = youScore;
    botScoreEl.textContent = botScore;

    // Geçmişi kaydet
    playerHistory.push(playerChoice);
    botHistory.push(botChoice);
    renderLog();

    // Coin Animasyonu
    coin.classList.add('spin');
    setTimeout(() => coin.classList.remove('spin'), 900);

    // Sonuç Ekranı Güncelleme
    playArea.style.display = 'none';
    resultArea.style.display = 'block';

    youChoiceText.textContent = playerChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    youChoiceText.className = playerChoice === 'steal' ? 'bot-tag' : 'you-tag'; // Kırmızı/Yeşil renk uyumu

    botChoiceText.textContent = botChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    botChoiceText.className = botChoice === 'steal' ? 'bot-tag' : 'you-tag';

    // Negatif puan durumlarında eksi işaretini ve renkleri optimize etme
    const youFormatted = yourPoints >= 0 ? `+${yourPoints}` : `${yourPoints}`;
    const botFormatted = botPoints >= 0 ? `+${botPoints}` : `${botPoints}`;
    pointsText.innerHTML = `Bu tur: sen <b>${youFormatted}</b> · rakip <b>${botFormatted}</b>`;

    const isLast = round >= TOTAL_ROUNDS;
    nextHint.textContent = isLast ? 'Sonuçlar hesaplanıyor…' : 'Sıradaki tur hazırlanıyor…';

    setTimeout(startRound, 2800);
  }

  function renderLog() {
    logEl.innerHTML = '';
    playerHistory.forEach(h => {
      const dot = document.createElement('div');
      dot.className = 'log-dot ' + h;
      logEl.appendChild(dot);
    });
  }

  function endGame() {
    playArea.style.display = 'none';
    resultArea.style.display = 'none';
    finalArea.style.display = 'block';

    const finalTitle = document.getElementById('finalTitle');
    const finalSub = document.getElementById('finalSub');

    // Kazanan Belirleme ve Ses Efektleri
    if (youScore > botScore) {
      finalTitle.textContent = 'Zafer Senin!';
      finalTitle.style.color = 'var(--share-bright)';
      playSound('win');
    } else if (botScore > youScore) {
      finalTitle.textContent = 'Kaybettin';
      finalTitle.style.color = 'var(--steal-bright)';
      playSound('lose');
    } else {
      finalTitle.textContent = 'Berabere';
      finalTitle.style.color = 'var(--gold-bright)';
      playSound('win');
    }
    finalSub.textContent = `Sen: ${youScore} Puan  ·  Rakip: ${botScore} Puan`;

    // İstatistik Bilgilerini Doldurma
    const stealCount = playerHistory.filter(h => h === 'steal').length;
    const shareCount = playerHistory.filter(h => h === 'share').length;
    document.getElementById('statYourChoices').textContent = `${stealCount} Çal / ${shareCount} Paylaş`;
    document.getElementById('statBotStrategy').textContent = currentBot.name;
  }

  function resetGame() {
    round = 0; 
    youScore = 0; 
    botScore = 0; 
    playerHistory = [];
    botHistory = [];
    youScoreEl.textContent = '0'; 
    botScoreEl.textContent = '0';
    
    // Her yeni oyunda rastgele ve farklı bir bot seçilir
    currentBot = selectRandomBot();
    
    renderLog();
    startRound();
  }

  // --- BAŞLANGIÇ TETİKLEYİCİLERİ ---
  stealBtn.addEventListener('click', () => makeChoice('steal'));
  shareBtn.addEventListener('click', () => makeChoice('share'));
  document.getElementById('replayBtn').addEventListener('click', resetGame);

  // Oyunu ilk kez yüklerken botu ata ve başlat
  currentBot = selectRandomBot();
  startRound();
</script>
</body>
</html>
