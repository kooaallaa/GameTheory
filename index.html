<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Game Theory — Çal ya da Paylaş</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #050508;
    --stage: rgba(20, 19, 25, 0.7);
    --stage-edge: rgba(212, 175, 55, 0.15);
    --gold: #d4af37;
    --gold-bright: #f4d97d;
    --steal: #b23a3a;
    --steal-bright: #e55c5c;
    --share: #2f7d6b;
    --share-bright: #43bfa3;
    --ink: #f3efe6;
    --ink-dim: #a3a097;
    --premium-glow: rgba(212, 175, 55, 0.08);
    
    --double-glow: rgba(147, 51, 234, 0.15);
    --double-edge: rgba(147, 51, 234, 0.4);
    --double-color: #a855f7;
    --double-color-bright: #c084fc;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(circle at 50% -20%, #1c1924 0%, #08080c 50%, var(--bg) 100%);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.8s ease;
  }

  body.double-mode {
    background: radial-gradient(circle at 50% -20%, #290f42 0%, #07040f 50%, var(--bg) 100%);
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 30px;
  }

  .header-container {
    text-align: center;
    margin-bottom: 20px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 1px;
    color: var(--gold-bright);
    margin: 0;
    text-shadow: 0 0 25px rgba(212,175,55,0.3);
    background: linear-gradient(180deg, #ffffff 10%, var(--gold-bright) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 4px 0 12px;
    opacity: 0.8;
  }

  .mission-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.04) 0%, rgba(212, 175, 55, 0.12) 50%, rgba(212, 175, 55, 0.04) 100%);
    border: 1px solid rgba(212, 175, 55, 0.25);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--gold-bright);
    text-shadow: 0 0 10px rgba(212,175,55,0.2);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }
  .mission-badge span { font-weight: 700; }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 10px 16px;
    backdrop-filter: blur(10px);
  }
  .score-box { text-align: center; min-width: 80px; }
  .score-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .score-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
  }
  .score-value.you { color: var(--share-bright); text-shadow: 0 0 15px rgba(67, 191, 163, 0.2); }
  .score-value.bot { color: var(--steal-bright); text-shadow: 0 0 15px rgba(229, 92, 92, 0.2); }

  /* Bot Durum Göstergesi (Öfke / Güven) */
  .bot-status-container {
    margin-top: 4px;
    font-size: 11px;
    min-height: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
  }
  .bot-status-container.neutral { color: var(--ink-dim); }
  .bot-status-container.trust { color: var(--share-bright); text-shadow: 0 0 8px rgba(67,191,163,0.3); }
  .bot-status-container.angry { color: var(--steal-bright); text-shadow: 0 0 8px rgba(229,92,92,0.3); }

  .round-pill {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--gold-bright);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 999px;
    padding: 6px 14px;
    background: rgba(212,175,55,0.06);
    transition: all 0.5s ease;
  }
  .round-pill.double-active {
    color: var(--double-color-bright);
    border-color: var(--double-edge);
    background: rgba(147, 51, 234, 0.15);
    box-shadow: 0 0 15px rgba(147, 51, 234, 0.3);
    animation: pulse 1.5s infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }

  .stage {
    position: relative;
    background: var(--stage);
    border: 1px solid var(--stage-edge);
    border-radius: 24px;
    padding: 34px 24px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 360px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 15px 35px rgba(0,0,0,0.5), 0 0 30px var(--premium-glow);
    transition: all 0.5s ease;
  }
  .stage.double-active {
    border-color: var(--double-edge);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.7), 0 15px 35px rgba(0,0,0,0.6), 0 0 35px var(--double-glow);
  }

  .spotlight {
    position: absolute;
    top: -50px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .coin {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, var(--gold-bright) 30%, var(--gold) 70%, #6e5210 100%);
    box-shadow: 0 0 35px rgba(212,175,55,0.4), inset 0 -6px 12px rgba(0,0,0,0.3), inset 0 4px 6px rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    margin-bottom: 24px;
    transition: transform 0.5s ease;
  }
  .coin.spin { animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes spin {
    0% { transform: rotateY(0deg) scale(1); }
    50% { transform: rotateY(360deg) scale(1.1); }
    100% { transform: rotateY(720deg) scale(1); }
  }

  .timer-ring { position: relative; width: 68px; height: 68px; margin-bottom: 24px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 3.5; }
  .timer-track { stroke: rgba(255,255,255,0.05); }
  .timer-progress {
    stroke: var(--gold);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
    filter: drop-shadow(0 0 4px var(--gold));
  }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 24px;
  }

  .prompt {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 23px;
    color: var(--ink);
    margin-bottom: 24px;
    min-height: 30px;
  }

  .choices { display: flex; gap: 16px; width: 100%; }
  .choice-btn {
    flex: 1; padding: 18px 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
    font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 700; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .choice-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .choice-btn:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
  
  .choice-btn.steal { background: linear-gradient(135deg, var(--steal-bright) 0%, var(--steal) 100%); color: #fff; box-shadow: 0 8px 24px rgba(178,58,58,0.3); }
  .choice-btn.steal:hover:not(:disabled) { box-shadow: 0 12px 28px rgba(178,58,58,0.45); }
  
  .choice-btn.share { background: linear-gradient(135deg, var(--share-bright) 0%, var(--share) 100%); color: #fff; box-shadow: 0 8px 24px rgba(47,125,107,0.3); }
  .choice-btn.share:hover:not(:disabled) { box-shadow: 0 12px 28px rgba(47,125,107,0.45); }
  .choice-btn:disabled { opacity: 0.25; cursor: default; }

  .result-card { width: 100%; text-align: center; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .result-line { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin: 8px 0; }
  .result-line .you-tag { color: var(--share-bright); font-weight: 700; }
  .result-line .bot-tag { color: var(--steal-bright); font-weight: 700; }
  .points-line { margin-top: 18px; font-size: 15px; color: var(--ink-dim); }
  .points-line b { color: var(--gold-bright); }
  .next-hint { margin-top: 22px; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ink-dim); opacity: 0.7; }

  .final { text-align: center; width: 100%; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .final-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; color: var(--gold-bright); margin-bottom: 4px; font-weight: 700; }
  .final-sub { color: var(--ink-dim); font-size: 15px; margin-bottom: 22px; }

  .stats-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 16px; padding: 18px; margin-bottom: 26px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .stats-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--gold-bright); border-bottom: 1px solid rgba(212, 175, 55, 0.15); padding-bottom: 8px; margin-bottom: 12px; text-align: center; }
  .stats-row { display: flex; justify-content: space-between; font-size: 13.5px; margin: 10px 0; color: var(--ink-dim); }
  .stats-row span { color: var(--ink); font-weight: 600; }
  .stats-row .highlight-bot { color: var(--gold-bright); font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; }

  .replay-btn {
    padding: 15px 34px; border-radius: 999px; border: 1px solid var(--gold);
    background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
    color: var(--gold-bright); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 4px 20px rgba(212,175,55,0.1); transition: all 0.2s ease;
  }
  .replay-btn:hover { background: rgba(212, 175, 55, 0.15); box-shadow: 0 6px 25px rgba(212,175,55,0.25); transform: translateY(-1px); }
  .replay-btn:active { transform: translateY(1px) scale(0.98); }

  .log { margin-top: 22px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .log-dot { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.03); transition: all 0.3s ease; }
  .log-dot.steal { background: var(--steal-bright); box-shadow: 0 0 10px rgba(229,92,92,0.45); }
  .log-dot.share { background: var(--share-bright); box-shadow: 0 0 10px rgba(67,191,163,0.45); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-container">
    <div class="title">The Game Theory</div>
    <div class="subtitle">Çal ya da Paylaş</div>
    <div class="mission-badge">
      🛡️ Hedef Puan: <span>15+ Puan</span>
    </div>
  </div>

  <div class="hud">
    <div class="score-box">
      <div class="score-label">Sen</div>
      <div class="score-value you" id="youScore">0</div>
    </div>
    <div class="round-pill" id="roundPill">Tur 1 / 7</div>
    <div class="score-box">
      <div class="score-label">Rakip</div>
      <div class="score-value bot" id="botScore">0</div>
      <div class="bot-status-container neutral" id="botStatus">Nötr</div>
    </div>
  </div>

  <div class="stage" id="stagePanel">
    <div class="spotlight"></div>

    <div id="playArea" style="width: 100%; text-align: center;">
      <div class="coin" id="coin">🪙</div>

      <div class="timer-ring" style="margin: 0 auto 20px;">
        <svg width="64" height="64">
          <circle class="timer-track" cx="32" cy="32" r="28"></circle>
          <circle class="timer-progress" id="timerCircle" cx="32" cy="32" r="28"
            stroke-dasharray="176" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-num" id="timerNum">20</div>
      </div>

      <div class="prompt" id="prompt">Kararını ver.</div>

      <div class="choices">
        <button class="choice-btn steal" id="stealBtn">ÇAL</button>
        <button class="choice-btn share" id="shareBtn">PAYLAŞ</button>
      </div>
    </div>

    <div id="resultArea" style="display:none;" class="result-card">
      <div class="result-line">Sen: <span class="you-tag" id="youChoiceText">—</span></div>
      <div class="result-line">Rakip: <span class="bot-tag" id="botChoiceText">—</span></div>
      <div class="points-line" id="pointsText"></div>
      <div class="next-hint" id="nextHint">Sıradaki tur hazırlanıyor…</div>
    </div>

    <div id="finalArea" style="display:none;" class="final">
      <div class="final-title" id="finalTitle">Oyun Bitti</div>
      <div class="final-sub" id="finalSub">Skorlar hesaplandı.</div>
      
      <div class="stats-card">
        <div class="stats-title">Savaş Özeti</div>
        <div class="stats-row">Senin Tercihlerin: <span id="statYourChoices">0 Çal / 0 Paylaş</span></div>
        <div class="stats-row">Gizemli Rakibin: <span id="statBotStrategy" class="highlight-bot">—</span></div>
        <div class="stats-row" id="missionStatusRow">Görev Durumu: <span id="statMission">—</span></div>
      </div>

      <button class="replay-btn" id="replayBtn">Tekrar Oyna</button>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
  const TOTAL_ROUNDS = 7;
  const ROUND_TIME = 20;
  const CIRC = 176;
  const TARGET_SCORE = 15; 

  let round = 0;
  let youScore = 0;
  let botScore = 0;
  let timeLeft = ROUND_TIME;
  let timerInterval = null;
  let decided = false;
  
  let playerHistory = []; 
  let botHistory = [];    
  let currentBot = null;  

  // --- AUDIO API ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'click') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'tick') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(750, now);
      gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
    } else if (type === 'win') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(330, now);
      osc.frequency.setValueAtTime(440, now + 0.08); osc.frequency.setValueAtTime(660, now + 0.16);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'lose') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now);
      osc.frequency.linearRampToValueAtTime(90, now + 0.35);
      gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    }
  }

  // --- 10 BOT STRATEJİSİ ---
  const BOT_STRATEGIES = [
    { name: "Diplomat (Tit For Tat)", decide: () => playerHistory.length === 0 ? 'share' : playerHistory[playerHistory.length - 1] },
    { name: "Kinci (Grudger)", decide: () => playerHistory.length === 0 ? 'share' : (playerHistory.includes('steal') ? 'steal' : 'share') },
    { name: "Kumarbaz (Random)", decide: () => Math.random() < 0.5 ? 'steal' : 'share' },
    { name: "Sabırlı (Tit For Two Tats)", decide: () => {
        if (playerHistory.length < 2) return 'share';
        return (playerHistory[playerHistory.length - 1] === 'steal' && playerHistory[playerHistory.length - 2] === 'steal') ? 'steal' : 'share';
    }},
    { name: "Analist (Adaptive)", decide: () => {
        if (playerHistory.length < 3) return 'share';
        const recent = playerHistory.slice(-4);
        return (recent.filter(h => h === 'steal').length > recent.length / 2) ? 'steal' : 'share';
    }},
    { name: "Kurnaz (Tester)", decide: () => {
        if (playerHistory.length === 0) return 'steal'; // İlk tur dener
        if (playerHistory.length === 1) return playerHistory[0] === 'steal' ? 'share' : 'steal';
        return playerHistory[playerHistory.length - 1];
    }},
    { name: "Kopya Kedisi (Copycat)", decide: () => {
        if (playerHistory.length === 0) return 'share';
        if (Math.random() < 0.10) return playerHistory[playerHistory.length - 1] === 'steal' ? 'share' : 'steal'; // %10 hata payı
        return playerHistory[playerHistory.length - 1];
    }},
    { name: "Barışçıl (Pushover)", decide: () => Math.random() < 0.90 ? 'share' : 'steal' },
    { name: "Yırtıcı (Predator)", decide: () => Math.random() < 0.90 ? 'steal' : 'share' },
    { name: "Dedektif (Detective)", decide: () => {
        const proto = ['share', 'steal', 'share', 'share'];
        if (playerHistory.length < 4) return proto[playerHistory.length];
        return playerHistory.includes('steal') ? playerHistory[playerHistory.length - 1] : 'steal';
    }}
  ];

  function selectRandomBot() {
    const lastBotName = sessionStorage.getItem('lastPlayedBot');
    let availableBots = BOT_STRATEGIES;
    if (lastBotName && BOT_STRATEGIES.length > 1) {
      availableBots = BOT_STRATEGIES.filter(b => b.name !== lastBotName);
    }
    const chosen = availableBots[Math.floor(Math.random() * availableBots.length)];
    sessionStorage.setItem('lastPlayedBot', chosen.name);
    return chosen;
  }

  // --- UI YÖNETİMİ ---
  const playArea = document.getElementById('playArea');
  const resultArea = document.getElementById('resultArea');
  const finalArea = document.getElementById('finalArea');
  const roundPill = document.getElementById('roundPill');
  const prompt = document.getElementById('prompt');
  const stealBtn = document.getElementById('stealBtn');
  const shareBtn = document.getElementById('shareBtn');
  const timerNum = document.getElementById('timerNum');
  const timerCircle = document.getElementById('timerCircle');
  const coin = document.getElementById('coin');
  const youScoreEl = document.getElementById('youScore');
  const botScoreEl = document.getElementById('botScore');
  const youChoiceText = document.getElementById('youChoiceText');
  const botChoiceText = document.getElementById('botChoiceText');
  const pointsText = document.getElementById('pointsText');
  const nextHint = document.getElementById('nextHint');
  const logEl = document.getElementById('log');
  const botStatusEl = document.getElementById('botStatus');
  const stagePanel = document.getElementById('stagePanel');

  function startRound() {
    round++;
    if (round > TOTAL_ROUNDS) { return endGame(); }

    decided = false;
    timeLeft = ROUND_TIME;
    
    // 5. Tur Görsel Efekt Kontrolü (Double Puan)
    if (round === 5) {
      document.body.classList.add('double-mode');
      stagePanel.classList.add('double-active');
      roundPill.classList.add('double-active');
      roundPill.innerHTML = `⚡ Tur 5 / 7 (X2 Puan!)`;
    } else {
      document.body.classList.remove('double-mode');
      stagePanel.classList.remove('double-active');
      roundPill.classList.remove('double-active');
      roundPill.textContent = `Tur ${round} / ${TOTAL_ROUNDS}`;
    }

    prompt.textContent = 'Kararını ver.';
    stealBtn.disabled = false;
    shareBtn.disabled = false;
    resultArea.style.display = 'none';
    finalArea.style.display = 'none';
    playArea.style.display = 'block';
    timerCircle.style.stroke = round === 5 ? 'var(--double-color)' : 'var(--gold)';
    updateTimerUI();

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 5) { 
        timerCircle.style.stroke = 'var(--steal-bright)'; 
        playSound('tick');
      }
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!decided) { makeChoice('share'); } 
      }
    }, 1000);
  }

  function updateTimerUI() {
    timerNum.textContent = Math.max(timeLeft, 0);
    const offset = CIRC - (CIRC * (timeLeft / ROUND_TIME));
    timerCircle.style.strokeDashoffset = offset;
  }

  function makeChoice(playerChoice) {
    if (decided) return;
    decided = true;
    clearInterval(timerInterval);
    
    stealBtn.disabled = true;
    shareBtn.disabled = true;
    playSound('click');

    const botChoice = currentBot.decide();

    // Temel Puanlama Matrisi
    let yourPoints = 0, botPoints = 0;
    if (playerChoice === 'share' && botChoice === 'share') { yourPoints = 3; botPoints = 3; } 
    else if (playerChoice === 'steal' && botChoice === 'share') { yourPoints = 5; botPoints = 1; } 
    else if (playerChoice === 'share' && botChoice === 'steal') { yourPoints = 1; botPoints = 5; } 
    else if (playerChoice === 'steal' && botChoice === 'steal') { yourPoints = -1; botPoints = -1; }

    // 5. Tur Katlayıcısı
    const multiplier = (round === 5) ? 2 : 1;
    yourPoints *= multiplier;
    botPoints *= multiplier;

    youScore += yourPoints;
    botScore += botPoints;
    youScoreEl.textContent = youScore;
    botScoreEl.textContent = botScore;

    // Bot Duygu Durum Göstergesi Güncelleme
    if (playerChoice === 'steal') {
      botStatusEl.textContent = "⚡ Öfkeli";
      botStatusEl.className = "bot-status-container angry";
    } else {
      botStatusEl.textContent = "❤️ Güvenli";
      botStatusEl.className = "bot-status-container trust";
    }

    playerHistory.push(playerChoice);
    botHistory.push(botChoice);
    renderLog();

    coin.classList.add('spin');
    setTimeout(() => coin.classList.remove('spin'), 900);

    playArea.style.display = 'none';
    resultArea.style.display = 'block';

    youChoiceText.textContent = playerChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    youChoiceText.className = playerChoice === 'steal' ? 'bot-tag' : 'you-tag';

    botChoiceText.textContent = botChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    botChoiceText.className = botChoice === 'steal' ? 'bot-tag' : 'you-tag';

    const youFormatted = yourPoints >= 0 ? `+${yourPoints}` : `${yourPoints}`;
    const botFormatted = botPoints >= 0 ? `+${botPoints}` : `${botPoints}`;
    pointsText.innerHTML = `Bu tur: sen <b>${youFormatted}</b> · rakip <b>${botFormatted}</b>`;

    const isLast = round >= TOTAL_ROUNDS;
    nextHint.textContent = isLast ? 'Sonuçlar hesaplanıyor…' : 'Sıradaki tur hazırlanıyor…';

    setTimeout(startRound, 2800);
  }

  function renderLog() {
    logEl.innerHTML = '';
    playerHistory.forEach(h => {
      const dot = document.createElement('div');
      dot.className = 'log-dot ' + h;
      logEl.appendChild(dot);
    });
  }

  function endGame() {
    playArea.style.display = 'none';
    resultArea.style.display = 'none';
    finalArea.style.display = 'block';

    const finalTitle = document.getElementById('finalTitle');
    const finalSub = document.getElementById('finalSub');
    const statMission = document.getElementById('statMission');

    const scoreCondition = youScore >= TARGET_SCORE; // En az 15 Puan

    // GELİŞMİŞ KAZANMA KRİTERLERİ (BARAJ: 15)
    if (scoreCondition && youScore > botScore) {
      finalTitle.textContent = 'Büyük Zafer!';
      finalTitle.style.color = 'var(--share-bright)';
      statMission.textContent = `Başarılı (${youScore} Puan)`;
      statMission.style.color = 'var(--share-bright)';
      playSound('win');
    } 
    else if (scoreCondition && youScore === botScore) {
      // İki taraf da 15+ geçmiş ama berabere kalmışsa
      finalTitle.textContent = 'Oyun Berabere';
      finalTitle.style.color = 'var(--gold-bright)';
      statMission.textContent = `Beraberlik (${youScore} Puan)`;
      statMission.style.color = 'var(--gold-bright)';
      playSound('win');
    } 
    else if (!scoreCondition) {
      // 15 puan barajının altında kalma durumu (Botu geçse bile başarısız)
      finalTitle.textContent = 'Baraj Geçilemedi!';
      finalTitle.style.color = 'var(--steal-bright)';
      statMission.textContent = `Başarısız (${youScore} / Hedef: 15)`;
      statMission.style.color = 'var(--steal-bright)';
      playSound('lose');
    } 
    else {
      // Skor olarak bota yenilme durumu (Kendisinin 15+ olmasına rağmen rakip daha yüksekse)
      finalTitle.textContent = 'Kaybettin';
      finalTitle.style.color = 'var(--steal-bright)';
      statMission.textContent = `Yetersiz Skor (Rakip Seni Geçti)`;
      statMission.style.color = 'var(--steal-bright)';
      playSound('lose');
    }

    finalSub.textContent = `Sen: ${youScore} Puan  ·  Rakip: ${botScore} Puan`;

    const stealCount = playerHistory.filter(h => h === 'steal').length;
    const shareCount = playerHistory.filter(h => h === 'share').length;
    document.getElementById('statYourChoices').textContent = `${stealCount} Çal / ${shareCount} Paylaş`;
    document.getElementById('statBotStrategy').textContent = currentBot.name;
  }

  function resetGame() {
    round = 0; youScore = 0; botScore = 0; playerHistory = []; botHistory = [];
    youScoreEl.textContent = '0'; botScoreEl.textContent = '0';
    botStatusEl.textContent = "Nötr"; botStatusEl.className = "bot-status-container neutral";
    
    currentBot = selectRandomBot();
    renderLog();
    startRound();
  }

  stealBtn.addEventListener('click', () => makeChoice('steal'));
  shareBtn.addEventListener('click', () => makeChoice('share'));
  document.getElementById('replayBtn').addEventListener('click', resetGame);

  currentBot = selectRandomBot();
  startRound();
</script>
</body>
</html>
