<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Game Theory — Çal ya da Paylaş</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #050508;
    --stage: rgba(20, 19, 25, 0.7);
    --stage-edge: rgba(212, 175, 55, 0.15);
    --gold: #d4af37;
    --gold-bright: #f4d97d;
    --steal: #b23a3a;
    --steal-bright: #e55c5c;
    --share: #2f7d6b;
    --share-bright: #43bfa3;
    --ink: #f3efe6;
    --ink-dim: #a3a097;
    --premium-glow: rgba(212, 175, 55, 0.08);
    
    --double-glow: rgba(147, 51, 234, 0.15);
    --double-edge: rgba(147, 51, 234, 0.4);
    --double-color: #a855f7;
    --double-color-bright: #c084fc;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: radial-gradient(circle at 50% -20%, #1c1924 0%, #08080c 50%, var(--bg) 100%);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.8s ease;
  }

  body.double-mode {
    background: radial-gradient(circle at 50% -20%, #290f42 0%, #07040f 50%, var(--bg) 100%);
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 40px;
  }

  /* --- GİRİŞ VE ANA MENÜ EKRANI --- */
  .menu-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    animation: fadeIn 0.5s ease;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 40px;
    letter-spacing: 1px;
    color: var(--gold-bright);
    margin: 0;
    text-shadow: 0 0 25px rgba(212,175,55,0.3);
    background: linear-gradient(180deg, #ffffff 10%, var(--gold-bright) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 4px 0 24px;
  }

  .input-card {
    background: var(--stage);
    border: 1px solid var(--stage-edge);
    padding: 24px;
    border-radius: 20px;
    width: 100%;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .input-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold-bright);
    margin-bottom: 8px;
    display: block;
  }

  .premium-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    text-align: center;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.3s;
  }
  .premium-input:focus { border-color: var(--gold); }

  /* Seçim Grupları */
  .select-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .select-btn {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink-dim);
    padding: 12px 6px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .select-btn.active {
    background: rgba(212, 175, 55, 0.1);
    border-color: var(--gold);
    color: var(--gold-bright);
  }

  /* Seviye Seçim Izgarası */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .level-btn {
    aspect-ratio: 1;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.3s;
  }
  .level-btn.active {
    border-color: var(--gold);
    color: var(--gold-bright);
    background: rgba(212, 175, 55, 0.12);
  }
  .level-btn.locked {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .level-btn.locked::after {
    content: "🔒";
    position: absolute;
    font-size: 9px;
    bottom: 2px;
  }

  /* --- OYUN ALANI --- */
  .game-screen { display: none; width: 100%; animation: fadeIn 0.4s ease; }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 10px 16px;
    backdrop-filter: blur(10px);
  }
  .score-box { text-align: center; min-width: 90px; }
  .score-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-dim); }
  .score-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--ink); }
  .score-value.you { color: var(--share-bright); }
  .score-value.bot { color: var(--steal-bright); }
  .bot-status-container { margin-top: 2px; font-size: 11px; font-weight: 500; }
  .bot-status-container.neutral { color: var(--ink-dim); }
  .bot-status-container.trust { color: var(--share-bright); }
  .bot-status-container.angry { color: var(--steal-bright); }

  .round-pill {
    font-size: 11px; font-weight: 500; letter-spacing: 1.5px; color: var(--gold-bright);
    border: 1px solid rgba(212,175,55,0.3); border-radius: 999px; padding: 6px 14px;
    background: rgba(212,175,55,0.06); transition: all 0.5s;
  }
  .round-pill.double-active {
    color: var(--double-color-bright); border-color: var(--double-edge);
    background: rgba(147, 51, 234, 0.15); box-shadow: 0 0 15px rgba(147, 51, 234, 0.3);
  }

  .stage {
    position: relative;
    background: var(--stage);
    border: 1px solid var(--stage-edge);
    border-radius: 24px;
    padding: 30px 20px 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 380px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 15px 35px rgba(0,0,0,0.5);
    transition: all 0.5s ease;
  }
  .stage.double-active {
    border-color: var(--double-edge);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.7), 0 0 35px var(--double-glow);
  }

  .coin {
    width: 86px; height: 86px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, var(--gold-bright) 30%, var(--gold) 70%, #6e5210 100%);
    box-shadow: 0 0 35px rgba(212,175,55,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin-bottom: 20px; transition: transform 0.5s;
  }
  .coin.spin { animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(720deg); }
  }

  .timer-ring { position: relative; width: 64px; height: 64px; margin-bottom: 20px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 3.5; }
  .timer-track { stroke: rgba(255,255,255,0.05); }
  .timer-progress { stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }

  .prompt { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 20px; min-height: 28px; }

  .choices { display: flex; gap: 16px; width: 100%; }
  .choice-btn {
    flex: 1; padding: 16px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.2s;
  }
  .choice-btn.steal { background: linear-gradient(135deg, var(--steal-bright) 0%, var(--steal) 100%); color: #fff; }
  .choice-btn.share { background: linear-gradient(135deg, var(--share-bright) 0%, var(--share) 100%); color: #fff; }
  .choice-btn:disabled { opacity: 0.25; cursor: default; }

  .result-card { width: 100%; text-align: center; display: none; }
  .result-line { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin: 6px 0; }
  .result-line span { font-weight: 700; }
  .points-line { margin-top: 14px; font-size: 14px; color: var(--ink-dim); }
  .next-hint { margin-top: 20px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-dim); opacity: 0.7; }

  /* --- OYUN SONU PANELİ VE GRAFİK --- */
  .final { text-align: center; width: 100%; display: none; }
  .final-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .final-sub { color: var(--ink-dim); font-size: 14px; margin-bottom: 16px; }

  /* Grafik Alanı */
  .canvas-container {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 16px;
    width: 100%;
  }
  canvas { width: 100% !important; height: auto !important; display: block; }

  .stats-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 16px; padding: 16px; margin-bottom: 20px; text-align: left; }
  .stats-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold-bright); border-bottom: 1px solid rgba(212, 175, 55, 0.15); padding-bottom: 6px; margin-bottom: 10px; text-align: center; }
  .stats-row { display: flex; justify-content: space-between; font-size: 13px; margin: 8px 0; color: var(--ink-dim); }
  .stats-row span { color: var(--ink); font-weight: 600; }

  /* --- PANEL VE GEÇMİŞ SEKMELERİ --- */
  .tabs {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-top: 30px;
    width: 100%;
  }
  .tab-link {
    flex: 1;
    background: none;
    border: none;
    color: var(--ink-dim);
    padding: 12px 0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    border-bottom: 2px solid transparent;
  }
  .tab-link.active {
    color: var(--gold-bright);
    border-bottom-color: var(--gold);
  }

  .tab-content {
    display: none;
    width: 100%;
    margin-top: 15px;
    max-height: 250px;
    overflow-y: auto;
  }
  .tab-content.active { display: block; }

  /* Tablo Tasarımları */
  .table-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 13px;
  }
  .table-item:last-child { border-bottom: none; }
  .table-name { font-weight: 600; }
  .table-score { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; color: var(--gold-bright); }
  .table-sub { font-size: 10px; color: var(--ink-dim); }

  .log { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .log-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.06); }
  .log-dot.steal { background: var(--steal-bright); }
  .log-dot.share { background: var(--share-bright); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="wrap">

  <div class="menu-screen" id="menuScreen">
    <div class="title">The Game Theory</div>
    <div class="subtitle">Seviyeler ve İttifaklar</div>

    <div class="input-card">
      <label class="input-label">OYUNCU ADI</label>
      <input type="text" id="usernameInput" class="premium-input" placeholder="Adını Yaz..." maxlength="15">

      <label class="input-label">OYUN SÜRESİ</label>
      <div class="select-group">
        <button class="select-btn active" onclick="setMode(7, this)">7 TUR (Min: 17)</button>
        <button class="select-btn" onclick="setMode(14, this)">14 TUR (Min: 34)</button>
        <button class="select-btn" onclick="setMode(21, this)">21 TUR (Min: 51)</button>
      </div>

      <label class="input-label">SEVİYE SEÇİMİ (KOLAYDAN ZORA)</label>
      <div class="level-grid" id="levelGrid"></div>

      <button class="replay-btn" style="width: 100%;" onclick="startGame()">SAVAŞI BAŞLAT</button>
    </div>

    <div class="tabs">
      <button class="tab-link active" onclick="switchTab('tabGlobal', this)">🏆 Zirvedekiler</button>
      <button class="tab-link" onclick="switchTab('tabWinners', this)">👑 Krallar</button>
      <button class="tab-link" onclick="switchTab('tabHistory', this)">📜 Geçmişim</button>
    </div>

    <div class="tab-content active" id="tabGlobal">
      <div id="globalList"><div style="text-align:center; padding:20px; color:var(--ink-dim);">Yükleniyor...</div></div>
    </div>
    
    <div class="tab-content" id="tabWinners">
      <div id="winnersList"><div style="text-align:center; padding:20px; color:var(--ink-dim);">Yükleniyor...</div></div>
    </div>

    <div class="tab-content" id="tabHistory">
      <div id="historyList"></div>
    </div>
  </div>

  <div class="game-screen" id="gameScreen">
    <div class="hud">
      <div class="score-box">
        <div class="score-label" id="hudPlayerName">Sen</div>
        <div class="score-value you" id="youScore">0</div>
      </div>
      <div class="round-pill" id="roundPill">Tur 1</div>
      <div class="score-box">
        <div class="score-label">Yapay Zeka</div>
        <div class="score-value bot" id="botScore">0</div>
        <div class="bot-status-container neutral" id="botStatus">Nötr</div>
      </div>
    </div>

    <div class="stage" id="stagePanel">
      <div id="playArea" style="width: 100%; text-align: center;">
        <div class="coin" id="coin">🪙</div>
        <div class="timer-ring" style="margin: 0 auto 20px;">
          <svg width="64" height="64">
            <circle class="timer-track" cx="32" cy="32" r="28"></circle>
            <circle class="timer-progress" id="timerCircle" cx="32" cy="32" r="28" stroke-dasharray="176" stroke-dashoffset="0"></circle>
          </svg>
          <div class="timer-num" id="timerNum">20</div>
        </div>
        <div class="prompt" id="prompt">Kararını ver.</div>
        <div class="choices">
          <button class="choice-btn steal" id="stealBtn" onclick="makeChoice('steal')">ÇAL</button>
          <button class="choice-btn share" id="shareBtn" onclick="makeChoice('share')">PAYLAŞ</button>
        </div>
      </div>

      <div id="resultArea" class="result-card">
        <div class="result-line"><span id="pNameText">Sen</span>: <span id="youChoiceText">—</span></div>
        <div class="result-line">Rakip: <span id="botChoiceText">—</span></div>
        <div class="points-line" id="pointsText"></div>
        <div class="next-hint" id="nextHint">Sıradaki tur hazırlanıyor…</div>
      </div>

      <div id="finalArea" class="final">
        <div class="final-title" id="finalTitle">Oyun Bitti</div>
        <div class="final-sub" id="finalSub">Skorlar hesaplandı.</div>
        
        <div class="canvas-container">
          <canvas id="chartCanvas" width="360" height="150"></canvas>
        </div>

        <div class="stats-card">
          <div class="stats-title">Savaş Özeti</div>
          <div class="stats-row">Seviye ve Rakip: <span id="statBotStrategy">—</span></div>
          <div class="stats-row">Görev Durumu: <span id="statMission">—</span></div>
        </div>
        <button class="replay-btn" onclick="exitToMenu()">Ana Menüye Dön</button>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
  // ==========================================
  // 🌐 FIREBASE AYARLARI (Senin Bilgilerinle Değişecek)
  // ==========================================
  const firebaseConfig = {
    apiKey: "BURAYA_API_KEY_GELECEK",
    authDomain: "BURAYA_AUTH_DOMAIN_GELECEK",
    projectId: "BURAYA_PROJECT_ID_GELECEK",
    storageBucket: "BURAYA_STORAGE_BUCKET_GELECEK",
    messagingSenderId: "BURAYA_MESSAGING_SENDER_ID_GELECEK",
    appId: "BURAYA_APP_ID_GELECEK"
  };

  let db = null;
  let isFirebaseReady = false;
  if (firebaseConfig.apiKey !== "BURAYA_API_KEY_GELECEK") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    isFirebaseReady = true;
  }

  // ==========================================
  // ⚙️ OYUN VE SEVİYE SİSTEMİ VERİLERİ
  // ==========================================
  let username = localStorage.getItem('username') || "Oyuncu";
  let maxUnlockedLevel = parseInt(localStorage.getItem('maxUnlockedLevel')) || 1;
  let selectedLevel = 1;
  let currentTotalRounds = 7;
  let targetScore = 17;

  let round = 0;
  let youScore = 0;
  let botScore = 0;
  let timeLeft = 20;
  let timerInterval = null;
  let decided = false;

  let playerHistory = [];
  let botHistory = [];
  let scoreHistoryPlayer = [0]; // Grafik için tur tur puanlar
  let scoreHistoryBot = [0];

  // 10 Farklı Bot (Kolaydan Zora Doğru Seviyeler)
  const BOT_STRATEGIES = {
    1: { name: "Barışçıl (Pushover) - Seviye 1", decide: () => Math.random() < 0.90 ? 'share' : 'steal' },
    2: { name: "Sabırlı (Tit For Two Tats) - Seviye 2", decide: () => {
        if (playerHistory.length < 2) return 'share';
        return (playerHistory[playerHistory.length - 1] === 'steal' && playerHistory[playerHistory.length - 2] === 'steal') ? 'steal' : 'share';
    }},
    3: { name: "Kumarbaz (Random) - Seviye 3", decide: () => Math.random() < 0.5 ? 'steal' : 'share' },
    4: { name: "Kopya Kedisi (Copycat) - Seviye 4", decide: () => {
        if (playerHistory.length === 0) return 'share';
        if (Math.random() < 0.10) return playerHistory[playerHistory.length - 1] === 'steal' ? 'share' : 'steal';
        return playerHistory[playerHistory.length - 1];
    }},
    5: { name: "Diplomat (Tit For Tat) - Seviye 5", decide: () => playerHistory.length === 0 ? 'share' : playerHistory[playerHistory.length - 1] },
    6: { name: "Kurnaz (Tester) - Seviye 6", decide: () => {
        if (playerHistory.length === 0) return 'steal';
        if (playerHistory.length === 1) return playerHistory[0] === 'steal' ? 'share' : 'steal';
        return playerHistory[playerHistory.length - 1];
    }},
    7: { name: "Analist (Adaptive) - Seviye 7", decide: () => {
        if (playerHistory.length < 3) return 'share';
        const recent = playerHistory.slice(-4);
        return (recent.filter(h => h === 'steal').length > recent.length / 2) ? 'steal' : 'share';
    }},
    8: { name: "Dedektif (Detective) - Seviye 8", decide: () => {
        const proto = ['share', 'steal', 'share', 'share'];
        if (playerHistory.length < 4) return proto[playerHistory.length];
        return playerHistory.includes('steal') ? playerHistory[playerHistory.length - 1] : 'steal';
    }},
    9: { name: "Kinci (Grudger) - Seviye 9", decide: () => playerHistory.length === 0 ? 'share' : (playerHistory.includes('steal') ? 'steal' : 'share') },
    10: { name: "Yırtıcı (Predator) - Seviye 10", decide: () => Math.random() < 0.90 ? 'steal' : 'share' }
  };

  // --- ARALIK & PANEL BAŞLANGICI ---
  document.getElementById('usernameInput').value = username;
  renderLevelGrid();
  loadLeaderboards();
  loadLocalHistory();

  function renderLevelGrid() {
    const grid = document.getElementById('levelGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.className = 'level-btn';
      if (i > maxUnlockedLevel) {
        btn.classList.add('locked');
        btn.disabled = true;
      } else {
        btn.textContent = i;
        if (i === selectedLevel) btn.classList.add('active');
        btn.onclick = () => {
          document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedLevel = i;
        };
      }
      grid.appendChild(btn);
    }
  }

  function setMode(turns, btn) {
    document.querySelectorAll('.select-group .select-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTotalRounds = turns;
    if (turns === 7) targetScore = 17;
    else if (turns === 14) targetScore = 34;
    else if (turns === 21) targetScore = 51;
    document.querySelector('.mission-badge span').textContent = `${targetScore}+ Puan`;
  }

  // --- SEKMELER ---
  function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  // --- OYUN AKIŞI ---
  function startGame() {
    const inputVal = document.getElementById('usernameInput').value.trim();
    if (!inputVal) return alert('Lütfen geçerli bir isim gir!');
    username = inputVal;
    localStorage.setItem('username', username);

    document.getElementById('hudPlayerName').textContent = username;
    document.getElementById('pNameText').textContent = username;

    document.getElementById('menuScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    round = 0; youScore = 0; botScore = 0; playerHistory = []; botHistory = [];
    scoreHistoryPlayer = [0]; scoreHistoryBot = [0];
    document.getElementById('youScore').textContent = '0';
    document.getElementById('botScore').textContent = '0';
    document.getElementById('botStatus').textContent = "Nötr";
    document.getElementById('botStatus').className = "bot-status-container neutral";
    document.getElementById('log').innerHTML = '';

    startRound();
  }

  function startRound() {
    round++;
    if (round > currentTotalRounds) { return endGame(); }

    decided = false;
    timeLeft = 20;

    // Double tur kontrolü
    let isDouble = false;
    if (currentTotalRounds === 7 && round === 5) isDouble = true;
    else if (currentTotalRounds === 14 && round === 7) isDouble = true;
    else if (currentTotalRounds === 21 && (round === 5 || round === 17)) isDouble = true;

    const roundPill = document.getElementById('roundPill');
    const stagePanel = document.getElementById('stagePanel');
    const timerCircle = document.getElementById('timerCircle');

    if (isDouble) {
      document.body.classList.add('double-mode');
      stagePanel.classList.add('double-active');
      roundPill.classList.add('double-active');
      roundPill.innerHTML = `⚡ Tur ${round} / ${currentTotalRounds} (X2!)`;
    } else {
      document.body.classList.remove('double-mode');
      stagePanel.classList.remove('double-active');
      roundPill.classList.remove('double-active');
      roundPill.textContent = `Tur ${round} / ${currentTotalRounds}`;
    }

    document.getElementById('prompt').textContent = 'Kararını ver.';
    document.getElementById('stealBtn').disabled = false;
    document.getElementById('shareBtn').disabled = false;
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('finalArea').style.display = 'none';
    document.getElementById('playArea').style.display = 'block';
    timerCircle.style.stroke = isDouble ? 'var(--double-color)' : 'var(--gold)';
    updateTimerUI();

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!decided) { makeChoice('share'); }
      }
    }, 1000);
  }

  function updateTimerUI() {
    document.getElementById('timerNum').textContent = Math.max(timeLeft, 0);
    const offset = CIRC - (CIRC * (timeLeft / 20));
    document.getElementById('timerCircle').style.strokeDashoffset = offset;
  }

  function makeChoice(playerChoice) {
    if (decided) return;
    decided = true;
    clearInterval(timerInterval);

    document.getElementById('stealBtn').disabled = true;
    document.getElementById('shareBtn').disabled = true;

    const botChoice = BOT_STRATEGIES[selectedLevel].decide();

    let yourPoints = 0, botPoints = 0;
    if (playerChoice === 'share' && botChoice === 'share') { yourPoints = 3; botPoints = 3; }
    else if (playerChoice === 'steal' && botChoice === 'share') { yourPoints = 5; botPoints = 1; }
    else if (playerChoice === 'share' && botChoice === 'steal') { yourPoints = 1; botPoints = 5; }
    else if (playerChoice === 'steal' && botChoice === 'steal') { yourPoints = -1; botPoints = -1; }

    // Çift kat tur çarpanı
    let isDouble = false;
    if (currentTotalRounds === 7 && round === 5) isDouble = true;
    else if (currentTotalRounds === 14 && round === 7) isDouble = true;
    else if (currentTotalRounds === 21 && (round === 5 || round === 17)) isDouble = true;

    if (isDouble) {
      yourPoints *= 2;
      botPoints *= 2;
    }

    youScore += yourPoints;
    botScore += botPoints;
    document.getElementById('youScore').textContent = youScore;
    document.getElementById('botScore').textContent = botScore;

    scoreHistoryPlayer.push(youScore);
    scoreHistoryBot.push(botScore);

    const botStatusEl = document.getElementById('botStatus');
    if (playerChoice === 'steal') {
      botStatusEl.textContent = "⚡ Öfkeli";
      botStatusEl.className = "bot-status-container angry";
    } else {
      botStatusEl.textContent = "❤️ Güvenli";
      botStatusEl.className = "bot-status-container trust";
    }

    playerHistory.push(playerChoice);
    botHistory.push(botChoice);
    renderLog();

    const coin = document.getElementById('coin');
    coin.classList.add('spin');
    setTimeout(() => coin.classList.remove('spin'), 900);

    document.getElementById('playArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';

    const youT = document.getElementById('youChoiceText');
    youT.textContent = playerChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    youT.className = playerChoice === 'steal' ? 'bot-tag' : 'you-tag';

    const botT = document.getElementById('botChoiceText');
    botT.textContent = botChoice === 'steal' ? 'ÇALDI' : 'PAYLAŞTI';
    botT.className = botChoice === 'steal' ? 'bot-tag' : 'you-tag';

    document.getElementById('pointsText').innerHTML = `Bu tur: sen <b>${yourPoints >= 0 ? '+' + yourPoints : yourPoints}</b> · rakip <b>${botPoints >= 0 ? '+' + botPoints : botPoints}</b>`;
    document.getElementById('nextHint').textContent = round >= currentTotalRounds ? 'Sonuçlar hesaplanıyor…' : 'Sıradaki tur hazırlanıyor…';

    setTimeout(startRound, 2500);
  }

  function renderLog() {
    const logEl = document.getElementById('log');
    logEl.innerHTML = '';
    playerHistory.forEach(h => {
      const dot = document.createElement('div');
      dot.className = 'log-dot ' + h;
      logEl.appendChild(dot);
    });
  }

  // --- OYUN SONU VE VERİ YAZMA ---
  function endGame() {
    document.getElementById('playArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('finalArea').style.display = 'block';

    const finalTitle = document.getElementById('finalTitle');
    const statMission = document.getElementById('statMission');

    const scoreCondition = youScore >= targetScore;
    let resultText = "lose";

    if (scoreCondition && youScore > botScore) {
      finalTitle.textContent = 'Büyük Zafer!';
      finalTitle.style.color = 'var(--share-bright)';
      statMission.textContent = `Başarılı (Skorun: ${youScore})`;
      statMission.style.color = 'var(--share-bright)';
      resultText = "win";

      // Kilit açma mantığı
      if (selectedLevel === maxUnlockedLevel && maxUnlockedLevel < 10) {
        maxUnlockedLevel++;
        localStorage.setItem('maxUnlockedLevel', maxUnlockedLevel);
        renderLevelGrid();
      }
    } else if (scoreCondition && youScore === botScore) {
      finalTitle.textContent = 'Beraberlik!';
      finalTitle.style.color = 'var(--gold-bright)';
      statMission.textContent = `Puan Korundu (${youScore})`;
      statMission.style.color = 'var(--gold-bright)';
      resultText = "draw";
    } else if (!scoreCondition) {
      finalTitle.textContent = 'Baraj Geçilemedi!';
      finalTitle.style.color = 'var(--steal-bright)';
      statMission.textContent = `Başarısız (Baraj: ${targetScore})`;
      statMission.style.color = 'var(--steal-bright)';
    } else {
      finalTitle.textContent = 'Yenilgi!';
      finalTitle.style.color = 'var(--steal-bright)';
      statMission.textContent = `Bot Seni Geçti (Rakip: ${botScore})`;
      statMission.style.color = 'var(--steal-bright)';
    }

    document.getElementById('finalSub').textContent = `${username}: ${youScore}  ·  Rakip: ${botScore}`;
    document.getElementById('statBotStrategy').textContent = BOT_STRATEGIES[selectedLevel].name;

    drawChart();
    saveGameResult(resultText);
  }

  // --- KANVAS PUAN GRAFİĞİ (ÇİZGİ) ---
  function drawChart() {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const maxPoints = Math.max(...scoreHistoryPlayer, ...scoreHistoryBot, 10);
    const minPoints = Math.min(...scoreHistoryPlayer, ...scoreHistoryBot, 0);
    const range = maxPoints - minPoints;

    const pad = 20;
    const w = canvas.width - (pad * 2);
    const h = canvas.height - (pad * 2);

    function getX(index) { return pad + (index * (w / currentTotalRounds)); }
    function getY(val) { return pad + h - (((val - minPoints) / range) * h); }

    // Çizgiler (Oyuncu: Yeşil, Bot: Kırmızı)
    function drawLine(history, color) {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.moveTo(getX(0), getY(history[0]));
      for (let i = 1; i <= currentTotalRounds; i++) {
        if (history[i] !== undefined) ctx.lineTo(getX(i), getY(history[i]));
      }
      ctx.stroke();

      // Noktalar
      for (let i = 0; i <= currentTotalRounds; i++) {
        if (history[i] !== undefined) {
          ctx.beginPath();
          ctx.fillStyle = color;
          ctx.arc(getX(i), getY(history[i]), 3.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    drawLine(scoreHistoryPlayer, '#43bfa3');
    drawLine(scoreHistoryBot, '#e55c5c');
  }

  // --- SKOR VE GEÇMİŞ YAZMA SİSTEMİ (BULUT VE YEREL) ---
  function saveGameResult(result) {
    const record = {
      username: username,
      score: youScore,
      botScore: botScore,
      botName: BOT_STRATEGIES[selectedLevel].name,
      level: selectedLevel,
      rounds: currentTotalRounds,
      result: result,
      timestamp: new Date().getTime()
    };

    // 1. Yerel Hafızaya Geçmiş Ekle
    let history = JSON.parse(localStorage.getItem('gameHistory')) || [];
    history.unshift(record);
    localStorage.setItem('gameHistory', JSON.stringify(history));
    loadLocalHistory();

    // 2. Firebase Buluta Gönder (Eğer Yapılandırıldıysa)
    if (isFirebaseReady) {
      db.collection("scores").add(record).then(() => {
        loadLeaderboards(); // Tabloları anında yenile
      }).catch(err => console.error("Firebase yazma hatası:", err));
    }
  }

  // --- KÜRESEL LİDERLİK VE GEÇMİŞİ LİSTELEME ---
  function loadLocalHistory() {
    const list = document.getElementById('historyList');
    const history = JSON.parse(localStorage.getItem('gameHistory')) || [];
    if (history.length === 0) {
      list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--ink-dim);">Henüz oynanmış oyunun yok.</div>`;
      return;
    }
    list.innerHTML = history.map(item => {
      let resColor = item.result === 'win' ? 'var(--share-bright)' : (item.result === 'draw' ? 'var(--gold-bright)' : 'var(--steal-bright)');
      let resText = item.result === 'win' ? 'Zafer' : (item.result === 'draw' ? 'Beraberlik' : 'Yenilgi');
      return `
        <div class="table-item">
          <div>
            <div class="table-name">${item.botName}</div>
            <div class="table-sub">${item.rounds} Tur · ${new Date(item.timestamp).toLocaleDateString()}</div>
          </div>
          <div style="text-align: right;">
            <div class="table-score">${item.score} - ${item.botScore}</div>
            <div style="font-size:10px; font-weight:700; color:${resColor};">${resText}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function loadLeaderboards() {
    if (!isFirebaseReady) {
      document.getElementById('globalList').innerHTML = `<div style="text-align:center; padding:15px; color:var(--ink-dim); font-size:12px;">Global Liderlik için Firebase Config ayarlarını yapmalısın.</div>`;
      document.getElementById('winnersList').innerHTML = `<div style="text-align:center; padding:15px; color:var(--ink-dim); font-size:12px;">Global Liderlik için Firebase Config ayarlarını yapmalısın.</div>`;
      return;
    }

    // 1. ZİRVEDEKİLER TABLOSU (Tek Elde En Fazla Puan Yapanlar)
    db.collection("scores")
      .orderBy("score", "desc")
      .limit(10)
      .get()
      .then(snapshot => {
        const listEl = document.getElementById('globalList');
        if (snapshot.empty) {
          listEl.innerHTML = `<div style="text-align:center; padding:10px; color:var(--ink-dim);">Henüz rekor yok.</div>`;
          return;
        }
        let index = 1;
        listEl.innerHTML = snapshot.docs.map(doc => {
          const d = doc.data();
          return `
            <div class="table-item">
              <div><span style="color:var(--gold-bright); font-weight:700; margin-right:8px;">#${index++}</span> <span class="table-name">${d.username}</span></div>
              <div class="table-score">${d.score} Puan</div>
            </div>
          `;
        }).join('');
      });

    // 2. KRALLAR TABLOSU (Toplam Galibiyet Sayısı En Çok Olanlar)
    db.collection("scores")
      .where("result", "==", "win")
      .get()
      .then(snapshot => {
        const listEl = document.getElementById('winnersList');
        if (snapshot.empty) {
          listEl.innerHTML = `<div style="text-align:center; padding:10px; color:var(--ink-dim);">Henüz kazanan kral yok.</div>`;
          return;
        }

        // Kullanıcıların galibiyetlerini grupla
        let winCounts = {};
        snapshot.docs.forEach(doc => {
          const name = doc.data().username;
          winCounts[name] = (winCounts[name] || 0) + 1;
        });

        // Nesneyi diziye çevir ve sırala
        let sortedWinners = Object.keys(winCounts).map(name => ({
          name: name,
          wins: winCounts[name]
        })).sort((a,b) => b.wins - a.wins).slice(0, 10);

        let index = 1;
        listEl.innerHTML = sortedWinners.map(w => `
          <div class="table-item">
            <div><span style="color:var(--gold-bright); font-weight:700; margin-right:8px;">#${index++}</span> <span class="table-name">${w.name}</span></div>
            <div class="table-score" style="color:var(--share-bright);">${w.wins} Zafer</div>
          </div>
        `).join('');
      });
  }

  function exitToMenu() {
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('menuScreen').style.display = 'block';
    loadLeaderboards();
  }
</script>
